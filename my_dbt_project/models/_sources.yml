# ============================================================================
# SOURCE DEFINITIONS & MODEL DOCUMENTATION
# ============================================================================
# This file defines:
# 1. Raw data sources (external CSV files)
# 2. Tests to validate data quality
# 3. Model documentation
# 4. Column descriptions and constraints

version: 2

# ============================================================================
# SECTION 1: SOURCE DEFINITIONS
# ============================================================================
# Sources represent raw/external data that dbt doesn't manage
# They're loaded using {{ source('source_name', 'table_name') }} in models

sources:
  - name: raw_data
    description: Raw source data from CSV files (seed files loaded via dbt seed)
    
    # Define where these sources live
    # For Snowflake, point to the pipeline schema where seeds are loaded
    database: null  # Uses default database from profiles.yml
    schema: pipeline  # Schema where seed files are loaded
    
    tables:
      # Customer source table
      - name: customers
        description: Raw customer data extracted from CSV
        columns:
          - name: customer_id
            description: Unique customer identifier
            tests:
              - unique  # Must be unique
              - not_null  # Cannot be null
          
          - name: customer_name
            description: Full name of customer
            tests:
              - not_null
          
          - name: email
            description: Customer email address
            tests:
              - unique
              - not_null
          
          - name: signup_date
            description: Date when customer signed up
            tests:
              - not_null
          
          - name: country
            description: Country of residence (2 letter code or full name)
      
      # Orders source table
      - name: orders
        description: Raw order transaction data from CSV
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - unique
              - not_null
          
          - name: customer_id
            description: Foreign key to customer
            tests:
              - not_null
              - relationships:
                  to: source('raw_data', 'customers')
                  field: customer_id
          
          - name: order_date
            description: Date of order transaction
            tests:
              - not_null
          
          - name: amount
            description: Order amount in USD
            tests:
              - not_null
          
          - name: status
            description: Order status (completed, pending, cancelled)
            tests:
              - accepted_values:
                  values: ['completed', 'pending', 'cancelled']

# ============================================================================
# SECTION 2: MODEL DOCUMENTATION
# ============================================================================
# Document all models in your project

models:
  # Staging models
  - name: stg_customers
    description: |
      Staging model for customer data.
      
      **Transformations applied:**
      - Standardized column names (snake_case)
      - Cleaned email addresses (lowercase)
      - Parsed signup_date to DATE type
      - Added surrogate key (hashed from customer_id + email)
      - Added loading timestamp
      - Removed duplicate records
      
      **Data Quality:**
      - No null customer IDs
      - No duplicate customer IDs
    
    columns:
      - name: customer_id
        description: Unique customer identifier from source
        tests:
          - unique
          - not_null
      
      - name: customer_name
        description: Cleaned customer name (title case, trimmed)
        tests:
          - not_null
      
      - name: email
        description: Lowercase email for consistency
        tests:
          - unique
          - not_null
      
      - name: signup_date
        description: Customer account creation date (DATE format)
        tests:
          - not_null
      
      - name: country
        description: Customer country (uppercase, defaults to UNKNOWN)
      
      - name: dbt_hashed_id
        description: Hash of customer_id and email for deduplication
      
      - name: loaded_at
        description: Timestamp when record was loaded

  - name: stg_orders
    description: |
      Staging model for order data.
      
      **Transformations applied:**
      - Parsed order_date to DATE type
      - Converted amount to NUMERIC(10,2) format
      - Standardized status field (lowercase)
      - Added data quality flags (is_valid_amount, is_valid_status)
      
      **Data Quality Checks:**
      - Amount must be > 0
      - Status must be in (completed, pending, cancelled)
    
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
      
      - name: customer_id
        description: References dim_customers
        tests:
          - not_null
      
      - name: order_date
        description: Order transaction date
        tests:
          - not_null
      
      - name: amount
        description: Order total in USD (2 decimal places)
        tests:
          - not_null
      
      - name: status
        description: Current order status
        tests:
          - not_null

  # Mart/Fact tables
  - name: fct_orders
    description: |
      Fact table containing order transactions with customer attributes.
      
      **Grain:** One row per order
      **Materialization:** TABLE (persisted)
      **Refresh:** Daily
      
      **Key Features:**
      - Denormalized customer attributes (name, email, country)
      - Calculated fields (days_since_signup, order_tier)
      - Customer aggregates (customer_lifetime_value, customer_order_count)
      - Status encoded as flag (is_completed)
      
      **Use Cases:**
      - Revenue reporting by customer/date
      - Order status tracking
      - Customer segmentation by order value
    
    columns:
      - name: order_id
        description: Primary key - unique order
        tests:
          - unique
          - not_null
      
      - name: customer_id
        description: Foreign key to customer dimension
      
      - name: customer_name
        description: Denormalized customer name
      
      - name: order_date
        description: Transaction date
      
      - name: amount
        description: Order amount in USD
      
      - name: status
        description: Order status code
      
      - name: order_tier
        description: |
          Categorized order value:
          - high_value: >= 500
          - medium_value: 200-499
          - low_value: < 200
      
      - name: customer_lifetime_value
        description: Total amount ordered by this customer (all time)
      
      - name: customer_order_count
        description: Total number of orders by this customer
      
      - name: is_completed
        description: Binary flag (1 = completed, 0 = other status)

  # Mart/Dimension tables
  - name: dim_customers
    description: |
      Customer dimension table.
      
      **Grain:** One row per unique customer
      **Materialization:** TABLE (persisted)
      
      **Attributes:**
      - Basic info (name, email, signup date)
      - Geographic (country, region)
      - Lifecycle status (New, Active, Mature)
      
      **Use Cases:**
      - Customer master data for joins
      - Customer segmentation
      - Demographic analysis
    
    columns:
      - name: customer_id
        description: Primary key
        tests:
          - unique
          - not_null
      
      - name: region
        description: Geographic region derived from country
        tests:
          - accepted_values:
              values:
                - 'North America'
                - 'Europe'
                - 'APAC'
                - 'Other'
      
      - name: customer_status
        description: |
          Lifecycle stage based on signup date:
          - New: Signed up <= 90 days ago
          - Active: Signed up 91-365 days ago
          - Mature: Signed up > 365 days ago

# ============================================================================
# SECTION 3: GENERIC TESTS
# ============================================================================
# Reusable test configurations that can be applied to multiple columns

generic_tests:
  - name: source_not_null
    description: Tests that a column in source data is not null

  - name: staging_unique
    description: Tests uniqueness in staging layer
