# ============================================================================
# dbt Project Configuration File
# ============================================================================
# This is the main configuration file for your dbt project.
# It defines how dbt should build your models and organize your project.

# Project name - used in compiled project paths
name: 'my_dbt_project'

# dbt version constraint
version: '1.0.0'

# Configuration of profiles.yml location
config-version: 2

# Define model paths - where your SQL models are located
model-paths: ["models"]

# CSV seed files location
seed-paths: ["seeds"]

# Test files location
test-paths: ["tests"]

# Macro files location (reusable SQL functions)
macro-paths: ["macros"]

# Compiled SQL files output location
target-path: "target"

# Model configuration
models:
  my_dbt_project:
    # Staging models - clean and standardize raw data
    staging:
      # Materialization: table (persistent), view, ephemeral (temporary), incremental
      materialized: view
      # Documentation requirement - all models must be documented
      required_fields:
        - name
        - description
    
    # Mart models - business-ready fact and dimension tables
    marts:
      materialized: table

# Seed configuration for loading CSV data
seeds:
  my_dbt_project:
    +column_types:
      customer_id: int
      order_id: int
      amount: numeric

# Test severity configuration
tests:
  my_dbt_project:
    +store_failures: true

# Profile settings
profile: 'my_dbt_project'

# Quoting strategy for identifiers
quoting:
  identifier: false
  schema: false

# On-run-start hook: runs SQL before dbt run
on-run-start:
  - "{{ log('Starting dbt run...', info=true) }}"

# On-run-end hook: runs SQL after dbt run completes
on-run-end:
  - "{{ log('dbt run completed successfully!', info=true) }}"
