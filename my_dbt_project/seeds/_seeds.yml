# ============================================================================
# SEED FILE CONFIGURATION
# ============================================================================
# Seeds are CSV files loaded into your database via dbt seed
# They contain static/reference data that doesn't change frequently
#
# Useful for:
# - Dimension tables (dates, categories, status codes)
# - Lookup tables
# - Reference data (exchange rates, tax codes)
#
# Usage: dbt seed
# ============================================================================

version: 2

seeds: []
  # Example seed configurations (commented out)
  # - name: date_dim
  #   description: Date dimension with business logic
  #   columns:
  #     - name: date_id
  #       description: Date in YYYYMMDD format
  #       tests:
  #         - unique
  #         - not_null
  # - name: status_codes
  #   description: Order status reference table
  #   config:
  #     column_types:
  #       status_code: varchar(50)
  #       status_description: varchar(255)

# HOW TO CREATE AND USE SEEDS:
#
# 1. Create CSV file in seeds/ directory:
#    seeds/status_reference.csv:
#    ```
#    status_code,status_description
#    C,Completed
#    P,Pending
#    X,Cancelled
#    ```

# 2. Load the seed:
#    $ dbt seed
#
# 3. Use in models:
#    select *
#    from {{ ref('status_reference') }}

# 4. Test in Your Model:
#    select o.*
#    from {{ ref('fct_orders') }} o
#    join {{ ref('status_reference') }} s
#      on o.status = s.status_code
